<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GRATİS – Elektrik Kontrol Formu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f3f0f7;
    --surface: #ffffff;
    --surface2: #f8f6fb;
    --border: #ddd6ec;
    --accent: #5C2D91;
    --accent2: #E6B800;
    --green: #16a34a;
    --red: #dc2626;
    --gray: #6b7280;
    --text: #1e1033;
    --text2: #7c6fa0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* HEADER */
  .header {
    background: var(--accent);
    border-bottom: 3px solid var(--accent2);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(92,45,145,0.25);
  }
  .header-logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 3px;
  }
  .header-title {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.3;
  }
  .header-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  /* META INFO */
  .meta-section {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }
  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meta-item label {
    display: block;
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
    font-family: var(--mono);
  }
  .meta-item input, .meta-item select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--sans);
    border-radius: 4px;
    outline: none;
  }
  .meta-item input:focus, .meta-item select:focus {
    border-color: var(--accent);
    background: #fff;
  }
  .meta-item.full { grid-column: 1 / -1; }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--surface);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s;
  }
  .progress-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }

  /* SECTION */
  .section {
    margin: 12px 12px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(92,45,145,0.07);
  }
  .section-header {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .section-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(245,166,35,0.1);
    padding: 2px 7px;
    border-radius: 3px;
  }
  .section-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .section-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--border);
    color: var(--text2);
  }
  .section-badge.complete {
    background: rgba(34,197,94,0.15);
    color: var(--green);
  }
  .section-toggle {
    font-size: 16px;
    color: var(--text2);
    transition: transform 0.2s;
  }
  .section-toggle.open { transform: rotate(180deg); }
  .section-body { display: none; }
  .section-body.open { display: block; }

  /* QUESTION */
  .question {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .question:last-child { border-bottom: none; }
  .question-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 10px;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .opt-btn {
    padding: 8px 4px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 5px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .opt-btn:active { transform: scale(0.97); }
  .opt-btn.selected-uygun {
    border-color: var(--green);
    background: rgba(22,163,74,0.10);
    color: var(--green);
    font-weight: 600;
  }
  .opt-btn.selected-hayir {
    border-color: var(--red);
    background: rgba(239,68,68,0.12);
    color: var(--red);
    font-weight: 600;
  }
  .opt-btn.selected-na {
    border-color: var(--gray);
    background: rgba(107,114,128,0.12);
    color: #9ca3af;
    font-weight: 600;
  }

  /* NOTE */
  .note-toggle {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--mono);
  }
  .note-toggle:hover { color: var(--accent); }
  .note-area {
    margin-top: 6px;
    width: 100%;
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 8px;
    border-radius: 4px;
    resize: none;
    display: none;
    outline: none;
    min-height: 60px;
  }
  .note-area:focus { border-color: var(--accent); }
  .note-area.visible { display: block; }

  /* PHOTO SECTION */
  .photo-section {
    margin: 12px 12px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .photo-header {
    background: var(--surface2);
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(92,45,145,0.05);
  }
  .photo-header span { color: var(--accent); font-family: var(--mono); font-size: 11px; }
  .photo-body { padding: 14px; }
  .photo-upload-area {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 12px;
    background: #fff;
  }
  .photo-upload-area:hover { border-color: var(--accent); background: rgba(92,45,145,0.04); }
  .photo-upload-area input { display: none; }
  .photo-upload-icon { font-size: 28px; margin-bottom: 6px; }
  .photo-upload-text { font-size: 12px; color: var(--text2); }
  .photo-upload-sub { font-size: 10px; color: var(--gray); margin-top: 2px; font-family: var(--mono); }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .photo-thumb {
    position: relative;
    border-radius: 5px;
    overflow: hidden;
    aspect-ratio: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .photo-remove {
    position: absolute;
    top: 3px;
    right: 3px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .photo-caption {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(0,0,0,0.6);
    padding: 2px 4px;
    font-size: 9px;
    color: #ccc;
    font-family: var(--mono);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* BOTTOM BUTTONS */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 4px solid var(--accent);
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 2;
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    border-top: 4px solid var(--accent);
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal h3 { font-size: 15px; margin-bottom: 4px; }
  .modal p { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: var(--text2); font-size: 12px; }
  .pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 10px;
  }
  .pill-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .pill-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .pill-gray { background: rgba(107,114,128,0.15); color: var(--gray); }
  .pill-orange { background: rgba(92,45,145,0.12); color: var(--accent); }

  .generating {
    text-align: center;
    padding: 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABS */
  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    scrollbar-width: none;
    padding: 0 12px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 14px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent2);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
    <!-- Logo upload area -->
    <div id="logoWrap" style="flex-shrink:0;">
      <div id="logoPlaceholder" onclick="document.getElementById('logoInput').click()"
        style="width:48px;height:48px;border-radius:8px;background:rgba(255,255,255,0.15);border:2px dashed rgba(255,255,255,0.4);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;">

        style="display:none;width:48px;height:48px;object-fit:contain;border-radius:8px;background:rgba(255,255,255,0.95);padding:3px;cursor:pointer;"
        onclick="document.getElementById('logoInput').click()">
      <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="loadLogo(event)">

    <div style="width:1px;height:36px;background:rgba(255,255,255,0.2);flex-shrink:0;"></div>
    <div style="min-width:0;">
      <div class="header-title" style="font-size:10px;letter-spacing:0.5px;margin-bottom:2px;">MARKA ADI</div>
      <input type="text" id="brandNameHeader"
        style="background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.4);color:#fff;font-size:15px;font-weight:700;font-family:var(--sans);outline:none;width:130px;padding:1px 2px;letter-spacing:0.5px;"
        placeholder="Marka Adı" value="GRATİS"

      <div class="header-title" style="font-size:9px;margin-top:1px;opacity:0.7;">Elektrik Ara Kontrol</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-secondary" style="flex:none;padding:8px 11px;font-size:10px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);" onclick="openSummary()">📋 ÖZET</button>
  </div>
</div>

<!-- META -->
<div class="meta-section">
  <div class="meta-grid">
    <div class="meta-item full">
      <label>Proje Adı</label>
      <input type="text" id="m-proje" placeholder="İST. TAKSİM CD. KATLI MAĞAZA" value="İST. TAKSİM CD. KATLI MAĞAZA">
    </div>
    <div class="meta-item">
      <label>Proje Adresi</label>
      <input type="text" id="m-adres" placeholder="İlçe / İl" value="TAKSİM / İSTANBUL">
    </div>
    <div class="meta-item">
      <label>Mağaza Tipi</label>
      <select id="m-tip">
        <option value="CADDE">CADDE</option>
        <option value="AVM">AVM</option>
      </select>
    </div>
    <div class="meta-item">
      <label>Proje Firma / Yüklenici</label>
      <input type="text" id="m-firma" placeholder="Firma adı" value="MVD PROJE">
    </div>
    <div class="meta-item">
      <label>Kontrol Tarihi</label>
      <input type="date" id="m-tarih">
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0 yanıtlandı</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">📋 Sorular</div>
  <div class="tab" onclick="switchTab(1)">📷 Fotoğraflar</div>
</div>

<!-- TAB CONTENTS -->
<div id="tab-0" class="tab-content active"></div>
<div id="tab-1" class="tab-content"></div>
<div id="tab-1-photos" class="tab-content" style="display:none">
  <div class="photo-section" style="margin:12px;display:block;">
    <div class="photo-header">📷 Kontrol Fotoğrafları <span>SAHAdan yükle</span></div>
    <div class="photo-body">
      <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" multiple accept="image/*" onchange="handlePhotos(event)">
        <div class="photo-upload-icon">📸</div>
        <div class="photo-upload-text">Fotoğraf ekle</div>
        <div class="photo-upload-sub">Galeri veya kamera</div>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="clearAll()">🗑 SİL</button>
  <button class="btn btn-primary" onclick="openSummary()">📄 PDF OLUŞTUR</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

// STATE
const answers = {}; // key: "s{sIdx}_q{qIdx}", value: "uygun"|"hayir"|"na"
const notes = {};
const photos = []; // {dataUrl, name}

// ── BUILD UI ────────────────────────────────────────────────────────────────
function buildSections() {
  const container = document.getElementById('tab-0');

  SECTIONS.forEach((sec, sIdx) => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = `sec-${sIdx}`;

    let questionsHTML = '';
    sec.questions.forEach((q, qIdx) => {
      questionsHTML += `
        <div class="question" id="q-${sIdx}-${qIdx}">
          <div class="question-text">${qIdx+1}. ${q}</div>
          <div class="options">
            <button class="opt-btn" onclick="setAnswer(${sIdx},${qIdx},'uygun')" id="btn-${sIdx}-${qIdx}-uygun">✓ UYGUN</button>
            <button class="opt-btn" onclick="setAnswer(${sIdx},${qIdx},'hayir')" id="btn-${sIdx}-${qIdx}-hayir">✗ UYGUN DEĞİL</button>
            <button class="opt-btn" onclick="setAnswer(${sIdx},${qIdx},'na')" id="btn-${sIdx}-${qIdx}-na">— N/A</button>
          </div>
          <span class="note-toggle" onclick="toggleNote(${sIdx},${qIdx})">✏ not ekle</span>
          <textarea class="note-area" id="note-${sIdx}-${qIdx}" placeholder="Açıklama..." oninput="saveNote(${sIdx},${qIdx},this.value)"></textarea>
        </div>`;
    });

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${sIdx})">
        <div class="section-header-left">
          <span class="section-num">S${sIdx+1}</span>
          <span class="section-name">${sec.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-badge" id="badge-${sIdx}">0/${sec.questions.length}</span>
          <span class="section-toggle" id="toggle-${sIdx}">▾</span>
        </div>
      </div>
      <div class="section-body open" id="body-${sIdx}">
        ${questionsHTML}
      </div>`;
    container.appendChild(div);
  });
}

function toggleSection(sIdx) {
  const body = document.getElementById(`body-${sIdx}`);
  const tog = document.getElementById(`toggle-${sIdx}`);
  body.classList.toggle('open');
  tog.classList.toggle('open');
}

function setAnswer(sIdx, qIdx, val) {
  const key = `s${sIdx}_q${qIdx}`;
  const prev = answers[key];
  
  // Deselect if same
  if (prev === val) {
    delete answers[key];
    ['uygun','hayir','na'].forEach(v => {
      document.getElementById(`btn-${sIdx}-${qIdx}-${v}`).className = 'opt-btn';
    });
  } else {
    answers[key] = val;
    ['uygun','hayir','na'].forEach(v => {
      const btn = document.getElementById(`btn-${sIdx}-${qIdx}-${v}`);
      btn.className = 'opt-btn' + (v === val ? ` selected-${v}` : '');
    });
  }
  updateProgress();
  updateBadge(sIdx);
}

function toggleNote(sIdx, qIdx) {
  const ta = document.getElementById(`note-${sIdx}-${qIdx}`);
  ta.classList.toggle('visible');
  if (ta.classList.contains('visible')) ta.focus();
}

function saveNote(sIdx, qIdx, val) {
  notes[`s${sIdx}_q${qIdx}`] = val;
}

function updateProgress() {
  const total = SECTIONS.reduce((a, s) => a + s.questions.length, 0);
  const done = Object.keys(answers).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} yanıtlandı`;
}

function updateBadge(sIdx) {
  const sec = SECTIONS[sIdx];
  const done = sec.questions.filter((_, qIdx) => answers[`s${sIdx}_q${qIdx}`]).length;
  const badge = document.getElementById(`badge-${sIdx}`);
  badge.textContent = `${done}/${sec.questions.length}`;
  badge.className = done === sec.questions.length ? 'section-badge complete' : 'section-badge';
}

// ── PHOTOS ──────────────────────────────────────────────────────────────────
function compressImage(dataUrl, maxW, maxH, quality, callback) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxW || h > maxH) {
      const ratio = Math.min(maxW / w, maxH / h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function handlePhotos(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      // Thumbnail for display (small)
      compressImage(ev.target.result, 400, 400, 0.7, thumb => {
        // PDF version: max 1200px wide, quality 0.5
        compressImage(ev.target.result, 1200, 1200, 0.5, pdf => {
          photos.push({ dataUrl: thumb, pdfUrl: pdf, name: file.name });
          renderPhotoGrid();
        });
      });
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPhotoGrid() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = photos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.dataUrl}" alt="foto ${i+1}">
      <button class="photo-remove" onclick="removePhoto(${i})">×</button>
      <div class="photo-caption">F${i+1}</div>
    </div>`).join('');
}

function removePhoto(i) {
  photos.splice(i, 1);
  renderPhotoGrid();
}

function switchTab(idx) {

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function clearAll() {
  if (!confirm('Tüm cevaplar silinsin mi?')) return;
  Object.keys(answers).forEach(k => delete answers[k]);
  Object.keys(notes).forEach(k => delete notes[k]);
  SECTIONS.forEach((sec, sIdx) => {
    sec.questions.forEach((_, qIdx) => {
      ['uygun','hayir','na'].forEach(v => {
        const btn = document.getElementById(`btn-${sIdx}-${qIdx}-${v}`);
        if (btn) btn.className = 'opt-btn';
      });
      const ta = document.getElementById(`note-${sIdx}-${qIdx}`);
      if (ta) { ta.value = ''; ta.classList.remove('visible'); }
    });
    updateBadge(sIdx);
  });
  updateProgress();
}

// ── PDF GENERATION ───────────────────────────────────────────────────────────
// Turkish character fix for jsPDF
function trFix(str) {
  if (!str) return '';
  return String(str)
    .replace(/İ/g, 'I')
    .replace(/ı/g, 'i')
    .replace(/Ğ/g, 'G')
    .replace(/ğ/g, 'g')
    .replace(/Ş/g, 'S')
    .replace(/ş/g, 's')
    .replace(/Ü/g, 'U')
    .replace(/ü/g, 'u')
    .replace(/Ö/g, 'O')
    .replace(/ö/g, 'o')
    .replace(/Ç/g, 'C')
    .replace(/ç/g, 'c');
}

async function generatePDF() {
  document.getElementById('modalContent').innerHTML = `
    <div class="generating">
      <div class="spinner"></div>
      PDF hazirlaniyor...<br>
      <small style="color:var(--gray)">Fotograflar isleniyor</small>
    </div>`;

  await new Promise(r => setTimeout(r, 100));

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

    const W = 210, H = 297;
    const ML = 14, MR = 14, MT = 14;
    let y = MT;

    const colors = {
      orange: [92, 45, 145],
      dark: [30, 16, 51],
      surface: [48, 24, 80],
      surface2: [62, 32, 100],
      border: [100, 70, 150],
      text: [240, 240, 240],
      text2: [190, 170, 220],
      green: [34, 197, 94],
      red: [239, 68, 68],
      gray: [150, 130, 180],
      white: [255, 255, 255],
      yellow: [230, 184, 0]
    };

    function newPage() {
      doc.addPage();
      y = MT;
      // Page background
      doc.setFillColor(...colors.dark);
      doc.rect(0, 0, W, H, 'F');
      // Footer
      addFooter();
    }

    function addFooter() {
      const pg = doc.internal.getCurrentPageInfo().pageNumber;
      doc.setFillColor(...colors.surface);
      doc.rect(0, H - 8, W, 8, 'F');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(...colors.text2);
      doc.text(trFix('GRATIS – Elektrik Isleri Ara Kontrol Formu'), ML, H - 3);
      doc.text(trFix(`Sayfa ${pg}`), W - ML, H - 3, { align: 'right' });
      doc.text(trFix('MA.01022021-R2'), W/2, H-3, { align: 'center' });
    }

    function checkY(needed) {
      if (y + needed > H - 15) newPage();
    }

    // ── COVER PAGE ──
    doc.setFillColor(...colors.dark);
    doc.rect(0, 0, W, H, 'F');

    // Top accent bar
    doc.setFillColor(...colors.orange);
    doc.rect(0, 0, W, 2, 'F');

    // Logo area
    doc.setFillColor(...colors.surface);
    doc.rect(0, 0, W, 60, 'F');
    doc.setFillColor(...colors.orange);
    doc.rect(0, 58, W, 2, 'F');

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(32);
    doc.setTextColor(...colors.orange);
    doc.text(trFix('GRATIS'), W/2, 28, { align: 'center' });

    doc.setFontSize(10);
    doc.setTextColor(...colors.text2);
    doc.setFont('helvetica', 'normal');
    doc.text(trFix('ELEKTRIK ISLERI ARA KONTROL FORMU'), W/2, 38, { align: 'center' });

    // Meta box
    const meta = [
      ['PROJE ADI', document.getElementById('m-proje').value || '–'],
      ['ADRES', document.getElementById('m-adres').value || '–'],
      ['MAGAZA TIPI', document.getElementById('m-tip').value || '–'],
      ['PROJE FIRMA / YUKLENICI', document.getElementById('m-firma').value || '–'],
      ['TARIH', document.getElementById('m-tarih').value || '–'],
    ];

    let my = 75;
    meta.forEach(([label, val]) => {
      doc.setFillColor(...colors.surface2);
      doc.roundedRect(ML, my, W-ML-MR, 9, 1, 1, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor(...colors.orange);
      doc.text(trFix(label), ML+3, my+5.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...colors.text);
      doc.text(trFix(val), ML+50, my+5.5);
      my += 11;
    });

    // Summary stats on cover
    const total = SECTIONS.reduce((a,s)=>a+s.questions.length,0);
    const uygunC = Object.values(answers).filter(v=>v==='uygun').length;
    const hayirC = Object.values(answers).filter(v=>v==='hayir').length;
    const naC = Object.values(answers).filter(v=>v==='na').length;
    const doneC = uygunC+hayirC+naC;

    my += 10;
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(...colors.text2);
    doc.text(trFix('KONTROL OZETI'), ML, my);
    my += 5;

    const stats = [
      { label:'Toplam Soru', val:total, color: colors.orange },
      { label:'Yanitlanan', val:`${doneC}/${total}`, color: colors.orange },
      { label:'Uygun', val: uygunC, color: colors.green },
      { label:'Uygun Degil', val: hayirC, color: colors.red },
      { label:'N/A', val: naC, color: colors.gray },
      { label:'Fotograf', val: photos.length, color: colors.orange },
    ];

    const bw = (W-ML-MR)/3 - 2;
    stats.forEach((s, i) => {
      const bx = ML + (i%3)*(bw+3);
      const by = my + Math.floor(i/3)*14;
      doc.setFillColor(...colors.surface2);
      doc.roundedRect(bx, by, bw, 12, 1,1,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(13);
      doc.setTextColor(...s.color);
      doc.text(trFix(String(s.val)), bx+bw/2, by+8, {align:'center'});
      doc.setFont('helvetica','normal');
      doc.setFontSize(6);
      doc.setTextColor(...colors.text2);
      doc.text(trFix(s.label).toUpperCase(), bx+bw/2, by+11.5, {align:'center'});
    });

    addFooter();

    // ── QUESTIONS PAGES ──
    newPage();

    const labelMap = { uygun:'✓ UYGUN', hayir:'✗ UYGUN DEGIL', na:'— N/A' };
    const colorMap = { uygun: colors.green, hayir: colors.red, na: colors.gray };

    SECTIONS.forEach((sec, sIdx) => {
      checkY(20);

      // Section header
      doc.setFillColor(...colors.surface2);
      doc.rect(ML, y, W-ML-MR, 9, 'F');
      doc.setFillColor(...colors.orange);
      doc.rect(ML, y, 3, 9, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.setTextColor(...colors.orange);
      doc.text(`S${sIdx+1}`, ML+6, y+5.5);
      doc.setTextColor(...colors.text);
      doc.text(trFix(sec.name), ML+14, y+5.5);

      // Section badge
      const done = sec.questions.filter((_,qi)=>answers[`s${sIdx}_q${qi}`]).length;
      const badgeColor = done===sec.questions.length ? colors.green : colors.text2;
      doc.setTextColor(...badgeColor);
      doc.setFontSize(7);
      doc.text(trFix(`${done}/${sec.questions.length}`), W-MR-2, y+5.5, {align:'right'});

      y += 11;

      sec.questions.forEach((q, qIdx) => {
        const key = `s${sIdx}_q${qIdx}`;
        const ans = answers[key];
        const note = notes[key] || '';

        // Question row height
        const qLines = doc.splitTextToSize(trFix(`${qIdx+1}. ${q}`), W-ML-MR-40);
        const rowH = Math.max(10, qLines.length * 4.5 + (note ? 5 : 2));
        checkY(rowH);

        // Row background
        doc.setFillColor(qIdx%2===0 ? 22 : 26, qIdx%2===0 ? 22 : 26, qIdx%2===0 ? 22 : 26);
        doc.rect(ML, y, W-ML-MR, rowH, 'F');

        // Question text
        doc.setFont('helvetica','normal');
        doc.setFontSize(7.5);
        doc.setTextColor(...colors.text);
        doc.text(qLines.map(trFix), ML+3, y+4.5);

        // Answer pill
        if (ans) {
          const pillW = 28;
          const pillX = W-MR-pillW-2;
          const pillY = y + 2;
          const col = colorMap[ans];
          doc.setFillColor(col[0], col[1], col[2], 0.15);
          doc.setFillColor(Math.min(255,col[0]+200), Math.min(255,col[1]+200), Math.min(255,col[2]+200));
          // Just draw colored text
          doc.setFont('helvetica','bold');
          doc.setFontSize(7);
          doc.setTextColor(...col);
          doc.text(trFix(labelMap[ans]), W-MR-3, y+5, {align:'right'});
        } else {
          doc.setFont('helvetica','normal');
          doc.setFontSize(7);
          doc.setTextColor(...colors.gray);
          doc.text(trFix('—'), W-MR-3, y+5, {align:'right'});
        }

        // Note
        if (note) {
          doc.setFont('helvetica','italic');
          doc.setFontSize(6.5);
          doc.setTextColor(...colors.text2);
          const noteLines = doc.splitTextToSize(trFix('Not: ' + note), W-ML-MR-40);
          doc.text(noteLines.map(trFix), ML+3, y+rowH-3);
        }

        // Border
        doc.setDrawColor(...colors.border);
        doc.setLineWidth(0.2);
        doc.line(ML, y+rowH, W-MR, y+rowH);

        y += rowH;
      });

      y += 4;
    });

    // ── PHOTO PAGES ──
    if (photos.length > 0) {
      newPage();

      // Photo section header
      doc.setFillColor(...colors.surface);
      doc.rect(0, MT, W, 10, 'F');
      doc.setFillColor(...colors.orange);
      doc.rect(0, MT, 3, 10, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.setTextColor(...colors.orange);
      doc.text(trFix('KONTROL FOTOGRAFLARI'), ML+6, MT+6.5);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.setTextColor(...colors.text2);
      doc.text(trFix(`${photos.length} fotograf`), W-MR, MT+6.5, {align:'right'});
      y = MT + 14;

      const cols = 2;
      const cellW = (W-ML-MR-(cols-1)*4)/cols;
      const cellH = cellW * 0.75;
      let col = 0;

      for (let i = 0; i < photos.length; i++) {
        if (col === 0) checkY(cellH + 8);
        const px = ML + col*(cellW+4);
        
        // Frame
        doc.setFillColor(...colors.surface2);
        doc.roundedRect(px, y, cellW, cellH, 2,2,'F');
        doc.setDrawColor(...colors.border);
        doc.setLineWidth(0.3);
        doc.roundedRect(px, y, cellW, cellH, 2,2,'S');

        // Image
        try {
          doc.addImage(photos[i].pdfUrl || photos[i].dataUrl, 'JPEG', px+1, y+1, cellW-2, cellH-8);
        } catch(e) {
          doc.setTextColor(...colors.gray);
          doc.setFontSize(8);
          doc.text(trFix('[Gorsel]'), px+cellW/2, y+cellH/2, {align:'center'});
        }

        // Caption
        doc.setFillColor(0,0,0,0.6);
        doc.setFillColor(20,20,20);
        doc.rect(px+1, y+cellH-7.5, cellW-2, 7, 'F');
        doc.setFont('helvetica','bold');
        doc.setFontSize(7);
        doc.setTextColor(...colors.orange);
        doc.text(trFix(`F${i+1}`), px+4, y+cellH-3.5);
        doc.setFont('helvetica','normal');
        doc.setTextColor(...colors.text2);
        const nameShort = photos[i].name.length > 30 ? photos[i].name.substring(0,27)+'...' : photos[i].name;
        doc.text(trFix(nameShort), px+12, y+cellH-3.5);

        col++;
        if (col >= cols) {
          col = 0;
          y += cellH + 6;
        }
      }
    }

    // Add footer to last page
    addFooter();

    // Save
    const proje = document.getElementById('m-proje').value || 'kontrol';
    const tarih = document.getElementById('m-tarih').value || new Date().toISOString().split('T')[0];
    doc.save(`${proje}_${tarih}_kontrol.pdf`);

    closeModal();
  } catch(err) {
    document.getElementById('modalContent').innerHTML = `
      <h3 style="color:var(--red)">Hata</h3>
      <p>${err.message}</p>
      <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:12px">Kapat</button>`;
  }
}

// ── LOGO ─────────────────────────────────────────────────────────────────────
let logoDataUrl = null;

function loadLogo(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    logoDataUrl = ev.target.result;
    document.getElementById('logoImg').src = logoDataUrl;
    document.getElementById('logoImg').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ── INIT ────────────────────────────────────────────────────────────────────
document.getElementById('m-tarih').value = new Date().toISOString().split('T')[0];
buildSections();
updateProgress();
// Init tab visibility
document.getElementById('tab-0').style.display = 'block';
const ph = document.getElementById('tab-1-photos');
if (ph) ph.style.display = 'none';
</script>
